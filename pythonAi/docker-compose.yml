version: '3.8'

services:
  # ChromaDB 服务
  chromadb:
    image: chromadb/chroma:latest          # 使用官方镜像
    container_name: resume-chromadb
    volumes:
      - ./chroma_data:/chroma/chroma       # 挂载本地目录，持久化数据
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    ports:
      - "8001:8000"                         # 映射到宿主机 8001，避免与后端冲突
    networks:
      - app-network
    restart: unless-stopped                  # 容器退出时自动重启

  # FastAPI 后端服务
  backend:
    build: .                                 # 使用当前目录的 Dockerfile 构建
    container_name: resume-backend
    depends_on:
      - chromadb                             # 确保 chromadb 先启动
    environment:
      - ZHIPUAI_API_KEY=${ZHIPUAI_API_KEY}   # 从宿主机环境变量或 .env 文件读取
    ports:
      - "8000:8000"
    volumes:
      - ./knowledge_base:/app/knowledge_base # 挂载知识库目录（方便更新）
      - ./chroma_data:/app/chroma_data       # 共享 ChromaDB 数据目录（可选）
    networks:
      - app-network
    restart: unless-stopped
    # 开发环境可以加 --reload 方便代码热重载
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

networks:
  app-network:
    driver: bridge